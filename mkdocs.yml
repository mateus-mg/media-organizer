site_name: Media Organizer Documentation
site_url: https://mateus-mg.github.io/media-organizer
site_description: Technical documentation for the Media Organizer System
site_author: Media Organizer Team

repo_name: mateus-mg/media-organizer
repo_url: https://github.com/mateus-mg/media-organizer

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - glightbox

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: mateus-mg
      repo: media-organizer
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting Started:
      - getting-started.md
      - guides/installation.md
      - guides/quick-start.md
  - Architecture:
      - architecture/index.md
      - architecture/overview.md
      - architecture/directory-structure.md
      - architecture/core-modules.md
      - architecture/infrastructure.md
      - architecture/data-flow.md
  - Configuration:
      - configuration/index.md
      - configuration/settings.md
      - configuration/environment-variables.md
      - configuration/conflict-resolution.md
  - Modules:
      - modules/index.md
      - modules/cli.md
      - modules/orchestrator.md
      - modules/organizers.md
      - modules/genre-guard.md
      - modules/metadata.md
      - modules/navidrome.md
      - modules/filename-suggestions.md
      - modules/trash-manager.md
  - Guides:
      - guides/index.md
      - guides/usage.md
      - guides/commands.md
      - guides/troubleshooting.md
  - Reference:
      - reference/cli-commands.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mateus-mg/media-organizer
