site_name: Media Organizer Documentation
site_url: https://mateus-mg.github.io/media-organizer
site_description: Technical documentation for the Media Organizer System
site_author: Media Organizer Team

repo_name: mateus-mg/media-organizer
repo_url: https://github.com/mateus-mg/media-organizer

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mateus-mg/media-organizer
  generator: false

nav:
  - Home: index.md
  - Getting Started:
      - getting-started.md
      - guides/installation.md
      - guides/quick-start.md
  - Architecture:
      - architecture/overview.md
      - architecture/directory-structure.md
      - architecture/modules.md
      - architecture/data-flow.md
  - Configuration:
      - configuration/index.md
      - configuration/settings.md
      - configuration/environment-variables.md
      - configuration/conflict-resolution.md
  - Modules:
      - modules/index.md
      - modules/cli.md
      - modules/orchestrator.md
      - modules/organizers.md
      - modules/genre-guard.md
      - modules/metadata.md
      - modules/navidrome.md
      - modules/filename-suggestions.md
      - modules/trash-manager.md
  - Guides:
      - guides/index.md
      - guides/usage.md
      - guides/commands.md
      - guides/troubleshooting.md
  - Reference:
      - reference/cli-commands.md
